name: Claude Code Lessons (MWF)

# Runs Monday, Wednesday, Friday at 7:00 AM ET (11:00 UTC during EDT)
on:
  schedule:
    - cron: '0 11 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-lesson:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine lesson number and date
        id: meta
        run: |
          LESSON_COUNT=$(jq '.lessons | length' public/lessons/lessons.json)
          NEXT_NUM=$((LESSON_COUNT + 1))
          PADDED_NUM=$(printf "%03d" $NEXT_NUM)
          TODAY=$(date +%Y-%m-%d)
          DAY_OF_WEEK=$(date +%A)
          SLUG="lesson-${PADDED_NUM}"

          echo "num=$NEXT_NUM" >> "$GITHUB_OUTPUT"
          echo "padded=$PADDED_NUM" >> "$GITHUB_OUTPUT"
          echo "date=$TODAY" >> "$GITHUB_OUTPUT"
          echo "day=$DAY_OF_WEEK" >> "$GITHUB_OUTPUT"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "branch=lessons/${SLUG}" >> "$GITHUB_OUTPUT"

      - name: Create lesson branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=${{ steps.meta.outputs.branch }}
          # Close any existing PR and delete remote branch from previous failed runs
          PR_NUM=$(gh pr list --head "$BRANCH" --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$PR_NUM" ]; then
            gh pr close "$PR_NUM" --delete-branch 2>/dev/null || true
          fi
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"

      - name: Generate lesson with Claude
        env:
          LESSON_NUM: ${{ steps.meta.outputs.padded }}
          LESSON_DATE: ${{ steps.meta.outputs.date }}
          LESSON_DAY: ${{ steps.meta.outputs.day }}
          LESSON_SLUG: ${{ steps.meta.outputs.slug }}
        run: |
          claude -p --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebFetch" --max-turns 30 "$(cat <<PROMPT
          You are a Claude Code educator. Create lesson ${LESSON_NUM} for a flashcard-style learning site.

          ## Task
          Research and create ONE focused, bite-sized lesson about Claude Code. Teach something specific, practical, and immediately useful.

          ## Topic Selection (follow this priority order strictly)
          1. Read public/lessons/lessons.json — note all previously covered topics and their titles so you NEVER repeat one. A topic is "covered" if any lesson already teaches the same concept, even from a different angle.
          2. **Check Anthropic docs for recent features.** Use WebFetch to fetch https://docs.anthropic.com/en/docs/claude-code/overview — scan the page for all linked sub-pages under the Claude Code section. Then fetch 1-2 of those sub-pages that look most likely to contain topics NOT already in lessons.json.
          3. Read files in research/ directory (SKIP presentation-summary.md — it is not a lesson source). Each numbered file is a potential lesson source.
          4. Pick a topic using this priority waterfall:
             a. **Newer features first:** Prefer topics from the Anthropic docs that cover recent or advanced capabilities NOT already in lessons.json.
             b. **Research files:** If all doc topics are covered, pick an uncovered sub-topic from research/ files (higher-numbered = newer, start there).
             c. **Basics fallback:** If everything above is covered, teach a fundamental Claude Code concept — something a new user would benefit from.
          5. Within a chosen source, pick a SPECIFIC sub-topic. Not "Claude Code SDK basics" but "Running Claude Code headless in CI pipelines with --print mode".
          6. Today is ${LESSON_DAY} (${LESSON_DATE}). Use the day to guide the angle:
             - Monday: Deep-dive into a feature, command, or setting
             - Wednesday: Workflow tip, best practice, or productivity technique
             - Friday: Recent capabilities, releases, or advanced techniques

          ## Research
          - The Anthropic docs (fetched via WebFetch) are your PRIMARY source — always check them first
          - The research/ directory is your secondary source for foundational topics (ignore presentation-summary.md)
          - Cross-reference both sources: use Anthropic docs for accuracy and recency, research/ files for depth
          - Information must be ACCURATE and UP TO DATE — if a doc page has newer info than a research file, prefer the doc page
          - NEVER teach a topic that has already been covered in lessons.json, even partially

          ## Steps

          ### 1. Create the lesson HTML
          Read public/lessons/TEMPLATE.html. Copy it and fill ALL placeholders to create public/lessons/${LESSON_SLUG}.html:
          - LESSON_TITLE: Clear, specific title
          - LESSON_NUMBER: Lesson ${LESSON_NUM}
          - LESSON_DATE: ${LESSON_DATE}
          - LESSON_TAGS: 2-3 <span class="tag"> elements
          - FLASHCARD_QUESTION: One clear question the reader can answer after reading
          - FLASHCARD_ANSWER: Concise 1-3 sentence answer
          - LESSON_CONTENT: Main body with HTML (h2, h3, p, code, pre, ul/li). 300-500 words max.
          - KEY_TAKEAWAY: One sentence to remember

          ### 2. Update the manifest
          Add to public/lessons/lessons.json:
          {
            "slug": "${LESSON_SLUG}",
            "title": "Your title",
            "summary": "One-sentence summary",
            "date": "${LESSON_DATE}",
            "tags": ["tag1", "tag2"]
          }

          ### 3. Create a shareable markdown summary
          Write a file called /tmp/lesson-pr-body.md with this structure:
          - A 1-2 sentence summary paragraph
          - "## Flashcard" section with the Q&A
          - "## Lesson" section with the full explanation in markdown (not HTML)
          - "## Key Takeaway" section
          - Do NOT include a "Read on the web" link — the PR preview action will add one automatically.
          This will be the PR description — make it clean and shareable.

          ### 4. Verify
          - Confirm the HTML file exists and is valid
          - Confirm lessons.json is valid JSON
          - Do NOT modify any other files

          Write like you're teaching a colleague. Be concise, accurate, practical.
          PROMPT
          )"

      - name: Validate generated lesson
        run: |
          SLUG=${{ steps.meta.outputs.slug }}
          LESSON_FILE="public/lessons/${SLUG}.html"

          # Check lesson file exists
          if [ ! -f "$LESSON_FILE" ]; then
            echo "::error::Lesson file ${LESSON_FILE} was not created"
            exit 1
          fi

          # Validate lessons.json is valid JSON
          if ! jq empty public/lessons/lessons.json 2>/dev/null; then
            echo "::error::lessons.json is not valid JSON"
            exit 1
          fi

          # Check for unreplaced template placeholders
          PLACEHOLDERS="LESSON_TITLE|LESSON_NUMBER|LESSON_DATE|LESSON_TAGS|FLASHCARD_QUESTION|FLASHCARD_ANSWER|LESSON_CONTENT|KEY_TAKEAWAY"
          if grep -qE "$PLACEHOLDERS" "$LESSON_FILE"; then
            echo "::error::Unreplaced placeholders found in ${LESSON_FILE}"
            grep -nE "$PLACEHOLDERS" "$LESSON_FILE"
            exit 1
          fi

          echo "Lesson validation passed"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/lessons/
          git commit -m "Add lesson ${{ steps.meta.outputs.padded }} (${{ steps.meta.outputs.date }})"
          git push -u origin ${{ steps.meta.outputs.branch }}

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE=$(jq -r '.lessons[-1].title' public/lessons/lessons.json)
          NUM=${{ steps.meta.outputs.padded }}

          # Use the shareable markdown body Claude generated
          BODY_FILE="/tmp/lesson-pr-body.md"
          if [ ! -f "$BODY_FILE" ]; then
            echo "New lesson ${NUM}" > "$BODY_FILE"
          fi

          PR_URL=$(gh pr create \
            --title "Lesson ${NUM}: ${TITLE}" \
            --body-file "$BODY_FILE" \
            --base master)

          PR_NUM=$(echo "$PR_URL" | grep -o '[0-9]*$')
          echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      # Deploy preview directly to gh-pages. GITHUB_TOKEN events don't trigger
      # other workflows, so pr-preview.yml never fires for lesson PRs.
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.has_changes == 'true'
        with:
          node-version: 20
          cache: npm
      - name: Build and deploy PR preview
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          npm ci
          npm run build
          PR_NUM=${{ steps.pr.outputs.pr_num }}
          PREVIEW_DIR="pr-preview/pr-${PR_NUM}"

          # Clean up any leftover clone (self-hosted runners persist state)
          rm -rf /tmp/gh-pages

          # Clone gh-pages branch (shallow) and copy preview into it
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            /tmp/gh-pages

          rm -rf "/tmp/gh-pages/${PREVIEW_DIR}"
          mkdir -p "/tmp/gh-pages/${PREVIEW_DIR}"
          cp -r dist/* "/tmp/gh-pages/${PREVIEW_DIR}/"

          cd /tmp/gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Deploy preview for PR #${PR_NUM}"
          git push origin gh-pages

      - name: Comment preview link
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=${{ steps.pr.outputs.pr_num }}
          gh pr comment "$PR_NUM" --body "📖 **[Preview this lesson](https://jaczaar.github.io/claude-code-bestpractices/pr-preview/pr-${PR_NUM}/lessons/${{ steps.meta.outputs.slug }}.html)**"

      - name: Build email body
        if: steps.changes.outputs.has_changes == 'true'
        id: email
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE=$(jq -r '.lessons[-1].title' public/lessons/lessons.json)
          NUM=${{ steps.meta.outputs.padded }}
          SLUG=${{ steps.meta.outputs.slug }}
          PR_NUM=$(gh pr list --head "${{ steps.meta.outputs.branch }}" --json number -q '.[0].number')
          PREVIEW_URL="https://jaczaar.github.io/claude-code-bestpractices/pr-preview/pr-${PR_NUM}/lessons/${SLUG}.html"
          PR_URL="https://github.com/${{ github.repository }}/pull/${PR_NUM}"

          # Read PR body for email content
          PR_BODY=$(gh pr view "$PR_NUM" --json body -q '.body')

          cat > /tmp/email-body.html <<HTMLEOF
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="UTF-8" />
          <meta name="viewport" content="width=device-width, initial-scale=1.0" />
          </head>
          <body style="margin:0; padding:0; background:#1e1b18; font-family:'Segoe UI',Helvetica,Arial,sans-serif;">
            <div style="max-width:600px; margin:0 auto; padding:32px 24px;">

              <!-- Header -->
              <div style="text-align:center; padding-bottom:24px; border-bottom:1px solid rgba(255,255,255,0.1);">
                <div style="font-size:11px; color:#d4845a; text-transform:uppercase; letter-spacing:2px; margin-bottom:8px;">
                  New Lesson Published
                </div>
                <h1 style="color:#f5f0e8; font-size:24px; font-weight:700; margin:0; line-height:1.3;">
                  Lesson ${NUM}: ${TITLE}
                </h1>
              </div>

              <!-- Lesson content from PR body -->
              <div style="padding:24px 0; color:#f5f0e8; font-size:15px; line-height:1.7;">
          HTMLEOF

          # Convert PR markdown body to simple HTML for the email
          echo "$PR_BODY" | sed \
            -e 's|^## \(.*\)|<h2 style="color:#d4845a; font-size:18px; font-weight:600; margin:24px 0 12px; padding-top:16px; border-top:1px solid rgba(255,255,255,0.07);">\1</h2>|' \
            -e 's|^### \(.*\)|<h3 style="color:#f5f0e8; font-size:16px; font-weight:600; margin:16px 0 8px;">\1</h3>|' \
            -e 's|^\*\*Q:\*\* \(.*\)|<p style="margin:8px 0;"><strong style="color:#d4845a;">Q:</strong> \1</p>|' \
            -e 's|^\*\*A:\*\* \(.*\)|<p style="margin:8px 0; padding:12px 16px; background:rgba(212,132,90,0.1); border-radius:8px; border-left:3px solid #d4845a;"><strong style="color:#d4845a;">A:</strong> \1</p>|' \
            -e 's|^- \(.*\)|<div style="margin:4px 0; padding-left:16px;">• \1</div>|' \
            -e 's|`\([^`]*\)`|<code style="background:#161210; padding:2px 6px; border-radius:4px; font-size:13px; color:#d4845a;">\1</code>|g' \
            -e 's|\*\*\([^*]*\)\*\*|<strong style="color:#f5f0e8;">\1</strong>|g' \
            -e '/^$/s|.*|<br/>|' \
            >> /tmp/email-body.html

          cat >> /tmp/email-body.html <<HTMLEOF
              </div>

              <!-- Preview button -->
              <div style="text-align:center; padding:24px 0;">
                <a href="${PREVIEW_URL}"
                   style="display:inline-block; padding:14px 32px; background:#d4845a; color:#1e1b18; font-size:15px; font-weight:600; text-decoration:none; border-radius:8px;">
                  View Lesson Preview
                </a>
              </div>

              <!-- Footer -->
              <div style="text-align:center; padding-top:20px; border-top:1px solid rgba(255,255,255,0.07);">
                <a href="${PR_URL}"
                   style="color:rgba(245,240,232,0.5); font-size:12px; text-decoration:none;">
                  View PR #${PR_NUM} on GitHub
                </a>
              </div>
            </div>
          </body>
          </html>
          HTMLEOF

          echo "title=Lesson ${NUM}: ${TITLE}" >> "$GITHUB_OUTPUT"

      - name: Send email notification
        if: steps.changes.outputs.has_changes == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: false
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "New Lesson: ${{ steps.email.outputs.title }}"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: Claude Code Lessons <${{ secrets.SMTP_USERNAME }}>
          html_body: file:///tmp/email-body.html
