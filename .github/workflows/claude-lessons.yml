name: Claude Code Lessons (MWF)

# Runs Monday, Wednesday, Friday at 7:00 AM ET (11:00 UTC during EDT)
on:
  schedule:
    - cron: '0 11 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-lesson:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine lesson number and date
        id: meta
        run: |
          LESSON_COUNT=$(jq '.lessons | length' public/lessons/lessons.json)
          NEXT_NUM=$((LESSON_COUNT + 1))
          PADDED_NUM=$(printf "%03d" $NEXT_NUM)
          TODAY=$(date +%Y-%m-%d)
          DAY_OF_WEEK=$(date +%A)
          SLUG="lesson-${PADDED_NUM}"

          echo "num=$NEXT_NUM" >> "$GITHUB_OUTPUT"
          echo "padded=$PADDED_NUM" >> "$GITHUB_OUTPUT"
          echo "date=$TODAY" >> "$GITHUB_OUTPUT"
          echo "day=$DAY_OF_WEEK" >> "$GITHUB_OUTPUT"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "branch=lessons/${SLUG}" >> "$GITHUB_OUTPUT"

      - name: Create lesson branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=${{ steps.meta.outputs.branch }}
          # Close any existing PR and delete remote branch from previous failed runs
          PR_NUM=$(gh pr list --head "$BRANCH" --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$PR_NUM" ]; then
            gh pr close "$PR_NUM" --delete-branch 2>/dev/null || true
          fi
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"

      - name: Generate lesson with Claude
        env:
          LESSON_NUM: ${{ steps.meta.outputs.padded }}
          LESSON_DATE: ${{ steps.meta.outputs.date }}
          LESSON_DAY: ${{ steps.meta.outputs.day }}
          LESSON_SLUG: ${{ steps.meta.outputs.slug }}
        run: |
          claude -p --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebFetch,WebSearch" --max-turns 30 "$(cat <<PROMPT
          You are a Claude Code educator. Create lesson ${LESSON_NUM} for a flashcard-style learning site.

          ## Task
          Research and create ONE focused, bite-sized lesson about Claude Code. Teach something specific, practical, and immediately useful.

          ## Topic Selection (follow this priority order strictly)
          1. Read public/lessons/lessons.json — note all previously covered topics and their titles so you NEVER repeat one. A topic is "covered" if any lesson already teaches the same concept, even from a different angle.
          2. **Search X (Twitter) for the latest Claude Code insights.** This is your TOP PRIORITY source — X has the most up-to-date tips and discoveries. Use WebSearch to run these searches:
             a. Search: "from:alexalbert__ claude code" — Alex Albert (Head of Claude Relations at Anthropic)
             b. Search: "from:amanrsanger claude code" — Aman Sanger (Claude Code lead at Anthropic)
             c. Search: "from:anthropaborkar claude code" — Anthropic engineer
             d. Search: "from:biraborkar claude code" — Anthropic engineer
             e. Search: "from:sdtoyer claude code" — Anthropic engineer
             f. Search: "from:bcherny claude code" — Boris Cherny (Anthropic engineer)
             g. General search: "anthropic claude code tip OR trick OR feature site:x.com" for broader community insights from Anthropic employees
             Run at least 3-4 of these searches. For any promising results, use WebFetch to read the full post/thread and extract the specific tip, workflow, or feature being discussed.
             **Focus on:** practical tips, newly announced features, workflow recommendations, hidden features, and best practices shared by Anthropic employees.
          3. **Check Anthropic docs for recent features.** Use WebFetch to fetch https://docs.anthropic.com/en/docs/claude-code/overview — scan the page for all linked sub-pages under the Claude Code section. Then fetch 1-2 of those sub-pages that look most likely to contain topics NOT already in lessons.json.
          4. Read files in research/ directory (SKIP presentation-summary.md — it is not a lesson source). Each numbered file is a potential lesson source.
          5. Pick a topic using this priority waterfall:
             a. **X/Twitter insights first:** Prefer topics discovered from Anthropic employees' X posts — these are the freshest, most practical tips. If an X post reveals a feature, workflow, or technique NOT in lessons.json, use it. Credit the source (e.g., "As shared by @username on X").
             b. **Newer features from docs:** If no fresh X insights are available, prefer topics from the Anthropic docs that cover recent or advanced capabilities NOT already in lessons.json.
             c. **Research files:** If all doc topics are covered, pick an uncovered sub-topic from research/ files (higher-numbered = newer, start there).
             d. **Basics fallback:** If everything above is covered, teach a fundamental Claude Code concept — something a new user would benefit from.
          6. Within a chosen source, pick a SPECIFIC sub-topic. Not "Claude Code SDK basics" but "Running Claude Code headless in CI pipelines with --print mode".
          7. Today is ${LESSON_DAY} (${LESSON_DATE}). Use the day to guide the angle:
             - Monday: Deep-dive into a feature, command, or setting
             - Wednesday: Workflow tip, best practice, or productivity technique
             - Friday: Recent capabilities, releases, or advanced techniques

          ## Research
          - **X (Twitter) posts from Anthropic employees are your #1 source** — they share the most current tips, hidden features, and workflows before they appear anywhere else. Always search X first.
          - The Anthropic docs (fetched via WebFetch) are your secondary source for official documentation
          - The research/ directory is your tertiary source for foundational topics (ignore presentation-summary.md)
          - Cross-reference all three sources: use X for freshness, Anthropic docs for accuracy, research/ files for depth
          - Information must be ACCURATE and UP TO DATE — if an X post or doc page has newer info than a research file, prefer the newer source
          - When a lesson is based on an X post, include a brief attribution (e.g., "Tip originally shared by @username on X") in the lesson content
          - NEVER teach a topic that has already been covered in lessons.json, even partially

          ## Steps

          ### 1. Create the lesson HTML
          Read public/lessons/TEMPLATE.html. Copy it and fill ALL placeholders to create public/lessons/${LESSON_SLUG}.html:
          - LESSON_TITLE: Clear, specific title
          - LESSON_NUMBER: Lesson ${LESSON_NUM}
          - LESSON_DATE: ${LESSON_DATE}
          - LESSON_TAGS: 2-3 <span class="tag"> elements
          - FLASHCARD_QUESTION: One clear question the reader can answer after reading
          - FLASHCARD_ANSWER: Concise 1-3 sentence answer
          - OG_DESCRIPTION: A lesson-specific one-sentence description (under 160 chars) summarizing the key insight — NOT the generic template text
          - LESSON_SLUG: ${LESSON_SLUG} (used in og:image and og:url meta tags — already in the template, just fill it)
          - LESSON_CONTENT: Main body with HTML (h2, h3, p, code, pre, ul/li). 300-500 words max.
          - KEY_TAKEAWAY: One sentence to remember

          ### 2. Update the manifest
          Add to public/lessons/lessons.json:
          {
            "slug": "${LESSON_SLUG}",
            "title": "Your title",
            "summary": "One-sentence summary",
            "date": "${LESSON_DATE}",
            "tags": ["tag1", "tag2"]
          }

          ### 3. Create a shareable markdown summary
          Write a file called /tmp/lesson-pr-body.md with this structure:
          - A 1-2 sentence summary paragraph
          - "## Flashcard" section with the Q&A
          - "## Lesson" section with the full explanation in markdown (not HTML)
          - "## Key Takeaway" section
          - Do NOT include a "Read on the web" link — the PR preview action will add one automatically.
          This will be the PR description — make it clean and shareable.

          ### 4. Create a tweet draft
          Write a file called public/lessons/${LESSON_SLUG}-tweet.txt containing a single tweet for this lesson.
          Rules:
          - Write in FIRST PERSON as someone who just learned or tried this — "I just discovered...", "TIL:", "I switched to X and..."
          - Lead with a surprising, specific insight or result — NOT a feature description
          - Make it conversational: something a developer would actually say to a colleague, not a product announcement
          - Include something reply-worthy: a hot take, a question, or a before/after comparison
          - The link goes at the very end, separated by a line break — let the OG card image do the selling
          - URLs count as 23 characters on X regardless of actual length — budget 257 chars for text + 23 for the link = 280 max
          - No hashtags, no emojis, no "New lesson:" prefix, no feature-list style
          - AVOID: vague attributions ("Claude Code's creator"), unverifiable claims, documentation-style prose
          - Good example: "TIL you can run Claude Code from your phone. Not a dumbed-down mobile app — your actual terminal, full tool access, code never leaves your machine.\n\nhttps://cclessons.jaczaar.com/lessons/lesson-007.html"
          - Bad example: "Claude Code's creator writes most of his code from his phone. /remote-control bridges your local terminal to the mobile app."

          ### 5. Create styled HTML email body
          Write a file called /tmp/lesson-email-body.html — a complete, self-contained HTML email.
          Requirements:
          - Full <!DOCTYPE html> document with ALL styles inline (style= attributes, no <style> blocks)
          - Dark theme: background #1e1b18, accent #d4845a, text #f5f0e8, muted rgba(245,240,232,0.6)
          - Max width 600px centered, 32px vertical / 24px horizontal padding
          - Structure:
            1. Header: "New Lesson Published" label (11px, uppercase, letter-spacing 2px, #d4845a), then "Lesson ${LESSON_NUM}: {title}" as h1 (24px, #f5f0e8)
            2. One-paragraph lesson summary
            3. Flashcard section: Q in bold #d4845a, A in highlighted box (rgba(212,132,90,0.1) bg, 3px left border #d4845a)
            4. 2-3 key content highlights as a styled list
            5. Key takeaway in a highlighted box
            6. Tweet preview section: label "Tweet Preview (posted on merge)" in muted text, then the tweet text from public/lessons/${LESSON_SLUG}-tweet.txt in a box styled like a quote (rgba(255,255,255,0.05) bg, 1px solid rgba(255,255,255,0.1) border, 12px padding, 8px border-radius, italic, 14px font-size)
            7. CTA button: "View Full Lesson" linking to PREVIEW_URL_PLACEHOLDER (inline-block, 14px/32px padding, #d4845a bg, #1e1b18 text, 8px border-radius)
            8. Footer: "View PR on GitHub" link to PR_URL_PLACEHOLDER (12px, muted color)
          - Code snippets: <code> with background #161210, padding 2px 6px, border-radius 4px, color #d4845a
          - Use PREVIEW_URL_PLACEHOLDER and PR_URL_PLACEHOLDER as literal strings — they will be replaced at send time

          ### 6. Verify
          - Confirm the HTML file exists and is valid
          - Confirm lessons.json is valid JSON
          - Confirm public/lessons/${LESSON_SLUG}-tweet.txt exists and is under 280 characters
          - Confirm /tmp/lesson-email-body.html exists
          - Do NOT modify any other files

          Write like you're teaching a colleague. Be concise, accurate, practical.
          PROMPT
          )"

      - name: Generate OG image
        run: |
          SLUG=${{ steps.meta.outputs.slug }}
          LESSON_FILE="public/lessons/${SLUG}.html"

          if [ ! -f "$LESSON_FILE" ]; then
            echo "::warning::Lesson file not found, skipping OG image"
            exit 0
          fi

          # Extract title and flashcard question from the generated HTML
          TITLE=$(grep -oP '(?<=<h1>).*?(?=</h1>)' "$LESSON_FILE" | head -1)
          QUESTION=$(grep -oP '(?<=<strong>).*?(?=</strong>)' "$LESSON_FILE" | head -1)

          if [ -z "$TITLE" ] || [ -z "$QUESTION" ]; then
            echo "::warning::Could not extract title/question from lesson HTML"
            exit 0
          fi

          npm install --no-save satori @resvg/resvg-js
          node scripts/generate-og-image.mjs "$SLUG" "$TITLE" "$QUESTION"

      - name: Validate generated lesson
        run: |
          SLUG=${{ steps.meta.outputs.slug }}
          LESSON_FILE="public/lessons/${SLUG}.html"

          # Check lesson file exists
          if [ ! -f "$LESSON_FILE" ]; then
            echo "::error::Lesson file ${LESSON_FILE} was not created"
            exit 1
          fi

          # Validate lessons.json is valid JSON
          if ! jq empty public/lessons/lessons.json 2>/dev/null; then
            echo "::error::lessons.json is not valid JSON"
            exit 1
          fi

          # Check for unreplaced template placeholders
          PLACEHOLDERS="LESSON_TITLE|LESSON_NUMBER|LESSON_DATE|LESSON_TAGS|FLASHCARD_QUESTION|FLASHCARD_ANSWER|LESSON_CONTENT|KEY_TAKEAWAY|OG_DESCRIPTION|LESSON_SLUG"
          if grep -qE "$PLACEHOLDERS" "$LESSON_FILE"; then
            echo "::error::Unreplaced placeholders found in ${LESSON_FILE}"
            grep -nE "$PLACEHOLDERS" "$LESSON_FILE"
            exit 1
          fi

          # Check tweet file exists and is under 280 effective chars
          # X counts URLs as 23 chars regardless of actual length
          TWEET_FILE="public/lessons/${SLUG}-tweet.txt"
          if [ ! -f "$TWEET_FILE" ]; then
            echo "::error::Tweet file ${TWEET_FILE} was not created"
            exit 1
          fi
          TWEET_CONTENT=$(cat "$TWEET_FILE")
          TWEET_URL=$(echo "$TWEET_CONTENT" | grep -oE 'https?://[^ ]+' | tail -1 || true)
          if [ -n "$TWEET_URL" ]; then
            TEXT_ONLY="${TWEET_CONTENT//$TWEET_URL/}"
            EFFECTIVE_LEN=$(( ${#TEXT_ONLY} + 23 ))
          else
            EFFECTIVE_LEN=${#TWEET_CONTENT}
          fi
          if [ "$EFFECTIVE_LEN" -gt 280 ]; then
            echo "::warning::Tweet is ${EFFECTIVE_LEN} effective chars (over 280)"
          fi

          # Check email body exists
          if [ ! -f /tmp/lesson-email-body.html ]; then
            echo "::warning::Email body was not created"
          fi

          echo "Lesson validation passed"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/lessons/
          git commit -m "Add lesson ${{ steps.meta.outputs.padded }} (${{ steps.meta.outputs.date }})"
          git push -u origin ${{ steps.meta.outputs.branch }}

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE=$(jq -r '.lessons[-1].title' public/lessons/lessons.json)
          NUM=${{ steps.meta.outputs.padded }}

          # Use the shareable markdown body Claude generated
          BODY_FILE="/tmp/lesson-pr-body.md"
          if [ ! -f "$BODY_FILE" ]; then
            echo "New lesson ${NUM}" > "$BODY_FILE"
          fi

          PR_URL=$(gh pr create \
            --title "Lesson ${NUM}: ${TITLE}" \
            --body-file "$BODY_FILE" \
            --base master)

          PR_NUM=$(echo "$PR_URL" | grep -o '[0-9]*$')
          echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      # Deploy preview directly to gh-pages. GITHUB_TOKEN events don't trigger
      # other workflows, so pr-preview.yml never fires for lesson PRs.
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.has_changes == 'true'
        with:
          node-version: 20
          cache: npm
      - name: Build and deploy PR preview
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          npm ci
          npm run build
          PR_NUM=${{ steps.pr.outputs.pr_num }}
          PREVIEW_DIR="pr-preview/pr-${PR_NUM}"

          # Clone gh-pages branch (shallow) and copy preview into it
          rm -rf /tmp/gh-pages
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            /tmp/gh-pages

          rm -rf "/tmp/gh-pages/${PREVIEW_DIR}"
          mkdir -p "/tmp/gh-pages/${PREVIEW_DIR}"
          cp -r dist/* "/tmp/gh-pages/${PREVIEW_DIR}/"

          cd /tmp/gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Deploy preview for PR #${PR_NUM}"
          git push origin gh-pages

      - name: Comment preview link
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=${{ steps.pr.outputs.pr_num }}
          gh pr comment "$PR_NUM" --body "📖 **[Preview this lesson](https://jaczaar.github.io/claude-code-bestpractices/pr-preview/pr-${PR_NUM}/lessons/${{ steps.meta.outputs.slug }}.html)**"

      - name: Build email body
        if: steps.changes.outputs.has_changes == 'true'
        id: email
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE=$(jq -r '.lessons[-1].title' public/lessons/lessons.json)
          NUM=${{ steps.meta.outputs.padded }}
          SLUG=${{ steps.meta.outputs.slug }}
          PR_NUM=${{ steps.pr.outputs.pr_num }}
          PREVIEW_URL="https://jaczaar.github.io/claude-code-bestpractices/pr-preview/pr-${PR_NUM}/lessons/${SLUG}.html"
          PR_URL="https://github.com/${{ github.repository }}/pull/${PR_NUM}"

          if [ -f /tmp/lesson-email-body.html ]; then
            # Use Claude-generated email, substitute placeholder URLs
            sed -e "s|PREVIEW_URL_PLACEHOLDER|${PREVIEW_URL}|g" \
                -e "s|PR_URL_PLACEHOLDER|${PR_URL}|g" \
                /tmp/lesson-email-body.html > /tmp/email-body.html
          else
            # Fallback: minimal email if Claude didn't generate the file
            cat > /tmp/email-body.html <<HTMLEOF
          <!DOCTYPE html>
          <html>
          <body style="margin:0; padding:0; background:#1e1b18; font-family:'Segoe UI',Helvetica,Arial,sans-serif;">
            <div style="max-width:600px; margin:0 auto; padding:32px 24px; text-align:center;">
              <div style="font-size:11px; color:#d4845a; text-transform:uppercase; letter-spacing:2px; margin-bottom:8px;">New Lesson Published</div>
              <h1 style="color:#f5f0e8; font-size:24px; font-weight:700; margin:0 0 24px; line-height:1.3;">Lesson ${NUM}: ${TITLE}</h1>
              <a href="${PREVIEW_URL}" style="display:inline-block; padding:14px 32px; background:#d4845a; color:#1e1b18; font-size:15px; font-weight:600; text-decoration:none; border-radius:8px;">View Lesson</a>
              <div style="margin-top:20px; padding-top:20px; border-top:1px solid rgba(255,255,255,0.07);">
                <a href="${PR_URL}" style="color:rgba(245,240,232,0.5); font-size:12px; text-decoration:none;">View PR #${PR_NUM} on GitHub</a>
              </div>
            </div>
          </body>
          </html>
          HTMLEOF
          fi

          echo "title=Lesson ${NUM}: ${TITLE}" >> "$GITHUB_OUTPUT"

      - name: Send email notification
        if: steps.changes.outputs.has_changes == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: false
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "New Lesson: ${{ steps.email.outputs.title }}"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: Claude Code Lessons <${{ secrets.SMTP_USERNAME }}>
          html_body: file:///tmp/email-body.html
