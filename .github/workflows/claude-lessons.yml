name: Claude Code Lessons (MWF)

# Runs Monday, Wednesday, Friday at 9:00 AM ET (14:00 UTC)
on:
  schedule:
    - cron: '0 14 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-lesson:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine lesson number and date
        id: meta
        run: |
          LESSON_COUNT=$(jq '.lessons | length' public/lessons/lessons.json)
          NEXT_NUM=$((LESSON_COUNT + 1))
          PADDED_NUM=$(printf "%03d" $NEXT_NUM)
          TODAY=$(date +%Y-%m-%d)
          DAY_OF_WEEK=$(date +%A)
          SLUG="lesson-${PADDED_NUM}"

          echo "num=$NEXT_NUM" >> "$GITHUB_OUTPUT"
          echo "padded=$PADDED_NUM" >> "$GITHUB_OUTPUT"
          echo "date=$TODAY" >> "$GITHUB_OUTPUT"
          echo "day=$DAY_OF_WEEK" >> "$GITHUB_OUTPUT"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "branch=lessons/${SLUG}" >> "$GITHUB_OUTPUT"

      - name: Create lesson branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=${{ steps.meta.outputs.branch }}
          # Close any existing PR and delete remote branch from previous failed runs
          PR_NUM=$(gh pr list --head "$BRANCH" --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$PR_NUM" ]; then
            gh pr close "$PR_NUM" --delete-branch 2>/dev/null || true
          fi
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"

      - name: Generate lesson with Claude
        env:
          LESSON_NUM: ${{ steps.meta.outputs.padded }}
          LESSON_DATE: ${{ steps.meta.outputs.date }}
          LESSON_DAY: ${{ steps.meta.outputs.day }}
          LESSON_SLUG: ${{ steps.meta.outputs.slug }}
        run: |
          claude -p --allowedTools "Bash,Read,Write,Edit,Glob,Grep" --max-turns 30 "$(cat <<PROMPT
          You are a Claude Code educator. Create lesson ${LESSON_NUM} for a flashcard-style learning site.

          ## Task
          Research and create ONE focused, bite-sized lesson about Claude Code. Teach something specific, practical, and immediately useful.

          ## Topic Selection
          1. Read public/lessons/lessons.json — DO NOT repeat covered topics.
          2. Today is ${LESSON_DAY} (${LESSON_DATE}). Pick from:
             - Monday: A Claude Code feature, command, or setting (deep dive)
             - Wednesday: A workflow tip, best practice, or productivity technique
             - Friday: Recent Claude Code releases, changelogs, or new capabilities
          3. Be SPECIFIC. Not "CLAUDE.md basics" but "Using CLAUDE.md local overrides for per-directory context".

          ## Research
          - Look at research/ directory for inspiration
          - Information must be ACCURATE and UP TO DATE

          ## Steps

          ### 1. Create the lesson HTML
          Read public/lessons/TEMPLATE.html CAREFULLY — including the design system reference in the HTML comment at the top.
          Copy it and fill ALL placeholders to create public/lessons/${LESSON_SLUG}.html:
          - LESSON_TITLE: Clear, specific title
          - LESSON_NUMBER: Lesson ${LESSON_NUM}
          - LESSON_DATE: ${LESSON_DATE}
          - LESSON_TAGS: 2-3 <span class="tag"> elements
          - FLASHCARD_QUESTION: One clear question the reader can answer after reading
          - FLASHCARD_ANSWER: Concise 1-3 sentence answer
          - LESSON_CONTENT: Main body with rich HTML content. 300-500 words max.
          - KEY_TAKEAWAY: One sentence to remember

          ### CRITICAL: Design System & Visual Quality
          The lesson pages use a refined Anthropic-inspired design system that MUST be followed precisely.
          Read the design reference comment at the top of TEMPLATE.html for full details. Key rules:

          **Color palette** (warm, NOT blue/GitHub-style):
          - Background: #1a1816 (warm dark brown)
          - Text: #f5f0e8 / #e8e0d4 (warm off-white)
          - Accent: #d4845a (warm orange)
          - Never use blue/purple accents or GitHub-style colors

          **Typography**: Manrope font (loaded via Google Fonts). Monospace: SF Mono/Fira Code.

          **Visual richness** — use these component classes in LESSON_CONTENT for visual variety:
          - <div class="callout"> for important highlighted boxes
          - <div class="tip-box"><div class="tip-label">Tip</div><p>...</p></div> for tips
          - <table class="info-table"> for data tables with accent-colored headers
          - <div class="comparison-grid"><div class="compare-box">...</div></div> for side-by-side comparisons
          - <pre><code>...</code></pre> for code blocks (styled automatically)
          - <details class="collapsible"><summary>Title</summary><div class="collapsible-body">...</div></details> for expandable sections
          - <blockquote> for accent-bordered quotes
          - <div class="terminal-mockup"> for terminal displays

          **Every lesson MUST include at least 2 visual components** beyond basic text/lists.
          For example: a table + a tip box, or a comparison grid + a callout, or a diagram + a code block.
          This makes each lesson feel polished and engaging, not like a plain text article.

          **Entrance animations**: The template includes staggered .animate-in classes. Keep these on all major sections.
          **Reading progress bar**: Already in the template. Don't remove it.
          **Grain texture**: Already in the CSS. Don't modify it.

          Do NOT change the CSS in the template. Only fill in the content placeholders.
          Reference lesson-001.html for a concrete example of the expected output quality.

          ### 2. Update the manifest
          Add to public/lessons/lessons.json:
          {
            "slug": "${LESSON_SLUG}",
            "title": "Your title",
            "summary": "One-sentence summary",
            "date": "${LESSON_DATE}",
            "tags": ["tag1", "tag2"]
          }

          ### 3. Create a shareable markdown summary
          Write a file called /tmp/lesson-pr-body.md with this structure:
          - A 1-2 sentence summary paragraph
          - "## Flashcard" section with the Q&A
          - "## Lesson" section with the full explanation in markdown (not HTML)
          - "## Key Takeaway" section
          - A link: "Read on the web: https://jaczaar.github.io/claude-code-bestpractices/lessons/${LESSON_SLUG}.html"
          This will be the PR description — make it clean and shareable.

          ### 4. Verify
          - Confirm the HTML file exists and is valid
          - Confirm lessons.json is valid JSON
          - Do NOT modify any other files (especially TEMPLATE.html or index.html)

          Write like you're teaching a colleague. Be concise, accurate, practical.
          PROMPT
          )"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/lessons/
          git commit -m "Add lesson ${{ steps.meta.outputs.padded }} (${{ steps.meta.outputs.date }})"
          git push -u origin ${{ steps.meta.outputs.branch }}

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE=$(jq -r '.lessons[-1].title' public/lessons/lessons.json)
          NUM=${{ steps.meta.outputs.padded }}

          # Use the shareable markdown body Claude generated
          BODY_FILE="/tmp/lesson-pr-body.md"
          if [ ! -f "$BODY_FILE" ]; then
            echo "New lesson ${NUM}" > "$BODY_FILE"
          fi

          PR_URL=$(gh pr create \
            --title "Lesson ${NUM}: ${TITLE}" \
            --body-file "$BODY_FILE" \
            --base master 2>&1 | tail -1)

          PR_NUMBER=$(echo "$PR_URL" | grep -oP '\d+$')

          # Add a comment with a direct link to the lesson preview
          gh pr comment "$PR_NUMBER" --body "$(cat <<COMMENT
          ### Preview

          Once the PR preview deploys, view the lesson directly:

          **Lesson page:** https://jaczaar.github.io/claude-code-bestpractices/pr-preview/pr-${PR_NUMBER}/lessons/${LESSON_SLUG}.html
          **Lessons index:** https://jaczaar.github.io/claude-code-bestpractices/pr-preview/pr-${PR_NUMBER}/lessons/
          COMMENT
          )"
