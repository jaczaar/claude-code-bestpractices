name: Post to X

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      lesson_slug:
        description: 'Lesson slug to tweet (e.g. lesson-012)'
        required: true
        type: string

jobs:
  post-tweet:
    # Run on merged lesson PR or manual dispatch
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'lessons/'))
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract lesson slug from branch
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SLUG="${{ github.event.inputs.lesson_slug }}"
          else
            BRANCH="${{ github.event.pull_request.head.ref }}"
            SLUG="${BRANCH#lessons/}"
          fi
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Read tweet text
        id: tweet
        run: |
          TWEET_FILE="public/lessons/${{ steps.meta.outputs.slug }}-tweet.txt"
          if [ ! -f "$TWEET_FILE" ]; then
            echo "::warning::Tweet file not found: ${TWEET_FILE}"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TWEET_TEXT=$(cat "$TWEET_FILE")

          # X counts every URL as 23 chars regardless of actual length
          # Calculate effective length the way X does
          URL=$(echo "$TWEET_TEXT" | grep -oE 'https?://[^ ]+' | tail -1 || true)
          if [ -n "$URL" ]; then
            URL_ACTUAL_LEN=${#URL}
            TEXT_WITHOUT_URL="${TWEET_TEXT//$URL/}"
            EFFECTIVE_COUNT=$(( ${#TEXT_WITHOUT_URL} + 23 ))
          else
            EFFECTIVE_COUNT=${#TWEET_TEXT}
          fi
          echo "Tweet (${EFFECTIVE_COUNT} effective chars, ${#TWEET_TEXT} raw): ${TWEET_TEXT}"

          if [ "$EFFECTIVE_COUNT" -gt 280 ]; then
            echo "::warning::Tweet exceeds 280 effective chars (${EFFECTIVE_COUNT}), truncating text"
            if [ -n "$URL" ]; then
              TEXT_PART="${TWEET_TEXT%$URL}"
              MAX_TEXT=$(( 280 - 23 - 3 ))  # budget for text: 280 - 23 (url) - 3 (...)
              TEXT_PART="${TEXT_PART:0:$MAX_TEXT}..."
              TWEET_TEXT="${TEXT_PART}${URL}"
            else
              TWEET_TEXT="${TWEET_TEXT:0:277}..."
            fi
          fi

          echo "$TWEET_TEXT" > /tmp/tweet-payload.txt
          echo "found=true" >> "$GITHUB_OUTPUT"

          # Check for OG image
          OG_IMAGE="public/lessons/${{ steps.meta.outputs.slug }}-og.png"
          if [ -f "$OG_IMAGE" ]; then
            echo "has_image=true" >> "$GITHUB_OUTPUT"
            echo "image_path=$OG_IMAGE" >> "$GITHUB_OUTPUT"
          else
            echo "has_image=false" >> "$GITHUB_OUTPUT"
          fi


      - name: Post to X
        if: steps.tweet.outputs.found == 'true'
        continue-on-error: true
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          HAS_IMAGE: ${{ steps.tweet.outputs.has_image }}
          IMAGE_PATH: ${{ steps.tweet.outputs.image_path }}
        run: |
          pip install requests-oauthlib --quiet

          python3 << 'PYEOF'
          import os, sys

          api_key = os.environ.get("TWITTER_API_KEY", "")
          api_secret = os.environ.get("TWITTER_API_SECRET", "")
          access_token = os.environ.get("TWITTER_ACCESS_TOKEN", "")
          access_secret = os.environ.get("TWITTER_ACCESS_SECRET", "")

          if not all([api_key, api_secret, access_token, access_secret]):
              print("::warning::Twitter API secrets not configured. Skipping.")
              sys.exit(0)

          from requests_oauthlib import OAuth1Session

          with open("/tmp/tweet-payload.txt") as f:
              tweet_text = f.read().strip()

          twitter = OAuth1Session(api_key, api_secret, access_token, access_secret)

          # Upload media if OG image exists
          media_id = None
          has_image = os.environ.get("HAS_IMAGE", "false")
          image_path = os.environ.get("IMAGE_PATH", "")

          if has_image == "true" and image_path and os.path.isfile(image_path):
              print(f"Uploading image: {image_path}")
              with open(image_path, "rb") as img:
                  upload_resp = twitter.post(
                      "https://upload.twitter.com/1.1/media/upload.json",
                      files={"media": img}
                  )
              if upload_resp.status_code in (200, 201):
                  media_id = upload_resp.json().get("media_id_string")
                  print(f"Media uploaded: {media_id}")
              else:
                  print(f"::warning::Media upload failed ({upload_resp.status_code}): {upload_resp.text}")

          # Build tweet payload
          payload = {"text": tweet_text}
          if media_id:
              payload["media"] = {"media_ids": [media_id]}

          resp = twitter.post(
              "https://api.x.com/2/tweets",
              json=payload
          )

          print(f"Status: {resp.status_code}")
          print(f"Body: {resp.text}")

          if resp.status_code == 201:
              tweet_id = resp.json()["data"]["id"]
              print(f"Tweet posted: https://x.com/i/status/{tweet_id}")
          else:
              print(f"::warning::Tweet failed ({resp.status_code}): {resp.text}")
          PYEOF
