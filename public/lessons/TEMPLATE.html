<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LESSON_TITLE — Claude Code Lessons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1e1b18;
      --bg-raised: #272320;
      --surface: rgba(255, 255, 255, 0.055);
      --surface-hover: rgba(255, 255, 255, 0.09);
      --border: rgba(255, 255, 255, 0.1);
      --border-hover: rgba(212, 132, 90, 0.5);
      --text: #f5f0e8;
      --text-muted: rgba(245, 240, 232, 0.65);
      --accent: #d4845a;
      --accent-soft: rgba(212, 132, 90, 0.14);
      --accent-glow: rgba(212, 132, 90, 0.25);
      --code-bg: #1a1714;
      --tag-bg: rgba(212, 132, 90, 0.12);
      --tag-border: rgba(212, 132, 90, 0.22);
      --font-heading: 'Exo', sans-serif;
      --font-mono: 'Roboto Mono', monospace;
      --font-body: 'Exo', -apple-system, BlinkMacSystemFont, sans-serif;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.03;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 9999;
    }

    .container {
      max-width: 740px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    /* Back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin-bottom: 2.5rem;
      color: var(--text-muted);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--accent); }

    .back-link svg {
      width: 14px;
      height: 14px;
    }

    /* Lesson header */
    .lesson-header {
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.5s var(--ease) both;
    }

    .lesson-number {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.75rem;
    }

    .lesson-number svg {
      width: 14px;
      height: 14px;
    }

    h1 {
      font-family: var(--font-heading);
      font-size: clamp(1.6rem, 1.2rem + 3vw, 2.4rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    .meta {
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.8rem;
    }

    .tags {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.65rem;
      flex-wrap: wrap;
    }

    .tag {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      padding: 0.2rem 0.55rem;
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      border-radius: 6px;
      color: var(--accent);
      letter-spacing: 0.03em;
      font-weight: 500;
    }

    /* Flashcard */
    .flashcard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      margin: 2rem 0 2.5rem;
      cursor: pointer;
      transition: border-color 0.3s var(--ease), box-shadow 0.3s var(--ease);
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s var(--ease) 0.1s both;
    }

    .flashcard::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-glow), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .flashcard:hover {
      border-color: var(--border-hover);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .flashcard:hover::before { opacity: 1; }

    .flashcard:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .flashcard-label {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 1rem;
      font-weight: 500;
    }

    .flashcard-label svg {
      width: 13px;
      height: 13px;
    }

    .flashcard-front strong {
      font-family: var(--font-heading);
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.45;
      display: block;
    }

    .flashcard-back {
      display: none;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--text);
      line-height: 1.7;
    }

    .flashcard.flipped .flashcard-back { display: block; }

    .flip-hint {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 1.25rem;
    }

    .flip-hint svg {
      width: 14px;
      height: 14px;
    }

    .flashcard.flipped .flip-hint { display: none; }

    /* Content */
    .content {
      animation: fadeUp 0.5s var(--ease) 0.2s both;
    }

    .content h2 {
      font-family: var(--font-heading);
      font-size: 1.35rem;
      font-weight: 600;
      margin: 2.5rem 0 1rem;
      color: var(--accent);
      letter-spacing: -0.01em;
    }

    .content h3 {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      font-weight: 600;
      margin: 1.75rem 0 0.75rem;
    }

    .content p { margin-bottom: 1rem; }
    .content ul, .content ol { margin: 1rem 0; padding-left: 1.5rem; }
    .content li { margin-bottom: 0.5rem; }

    .content code {
      font-family: var(--font-mono);
      background: var(--code-bg);
      border: 1px solid var(--border);
      padding: 0.15rem 0.45rem;
      border-radius: 5px;
      font-size: 0.88em;
    }

    .content pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      overflow-x: auto;
      margin: 1.25rem 0;
    }

    .content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.85rem;
      line-height: 1.65;
    }

    .content blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.75rem 1rem;
      color: var(--text-muted);
      margin: 1.25rem 0;
      background: var(--surface);
      border-radius: 0 8px 8px 0;
    }

    /* Key takeaway */
    .key-takeaway {
      background: var(--accent-soft);
      border: 1px solid var(--tag-border);
      border-radius: 14px;
      padding: 1.75rem;
      margin: 2.5rem 0;
      animation: fadeUp 0.5s var(--ease) 0.3s both;
    }

    .key-takeaway h3 {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-heading);
      color: var(--accent);
      margin: 0 0 0.6rem;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .key-takeaway h3 svg {
      width: 16px;
      height: 16px;
    }

    .key-takeaway p {
      color: var(--text);
      line-height: 1.65;
    }

    /* Navigation footer */
    .nav-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 3.5rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      animation: fadeUp 0.5s var(--ease) 0.35s both;
    }

    .nav-footer a {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: var(--text-muted);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      transition: color 0.2s;
    }

    .nav-footer a:hover { color: var(--accent); }

    .nav-footer a svg {
      width: 14px;
      height: 14px;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 600px) {
      .container { padding: 2rem 1rem 3rem; }
      .flashcard { padding: 1.5rem; }
      .key-takeaway { padding: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
      All Lessons
    </a>

    <div class="lesson-header">
      <div class="lesson-number">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        LESSON_NUMBER
      </div>
      <h1>LESSON_TITLE</h1>
      <div class="meta">
        <div>LESSON_DATE</div>
        <div class="tags">LESSON_TAGS</div>
      </div>
    </div>

    <div class="flashcard" onclick="this.classList.toggle('flipped')" tabindex="0" role="button" aria-label="Flashcard — click to reveal answer" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.classList.toggle('flipped')}">
      <div class="flashcard-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
        Quick Quiz
      </div>
      <div class="flashcard-front">
        <strong>FLASHCARD_QUESTION</strong>
        <div class="flip-hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 15l-2 5L9 9l11 4-5 2z"/></svg>
          Click to reveal answer
        </div>
      </div>
      <div class="flashcard-back">
        FLASHCARD_ANSWER
      </div>
    </div>

    <div class="content">
      LESSON_CONTENT
    </div>

    <div class="key-takeaway">
      <h3>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4"/><path d="m6.343 6.343 2.828 2.828"/><path d="M2 12h4"/><circle cx="12" cy="12" r="3"/></svg>
        Key Takeaway
      </h3>
      <p>KEY_TAKEAWAY</p>
    </div>

    <div class="nav-footer">
      <a href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
        All Lessons
      </a>
      <a href="../">
        Best Practices
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </a>
    </div>
  </div>
</body>
</html>
